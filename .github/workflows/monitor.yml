name: CARDS Whale Alerter

on:
  schedule:
    # GitHub Actions cron floor is ~5 min (and can lag a few min under load).
    - cron: "*/5 * * * *"
  workflow_dispatch: {}   # lets you run it manually from the Actions tab

permissions:
  contents: write          # needed to commit state.json back

concurrency:
  group: cards-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run monitor
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          BOT_PASSWORD: ${{ secrets.BOT_PASSWORD }}      # password users send to subscribe
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: ${{ vars.ANTHROPIC_MODEL }}   # optional override
          RPC_URL: ${{ secrets.RPC_URL }}                # optional Helius/QuickNode URL
        run: python -m bot.monitor

      - name: Commit updated state
        run: |
          git config user.name "cards-bot"
          git config user.email "cards-bot@users.noreply.github.com"
          git add state/state.json state/subscribers.json
          git commit -m "update state [skip ci]" || echo "no state change"
          git pull --rebase --autostash || true
          git push || echo "nothing to push"
